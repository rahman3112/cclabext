<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AWS S3 Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: white;
            width: 60%;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #ff9900;
        }

        p {
            color: #333;
            font-size: 18px;
        }

        button {
            background-color: #232f3e;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #37475a;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Welcome to My S3 Static Website</h1>

        <p>
            This website is hosted using Amazon S3 Static Website Hosting.
        </p>

        <p>
            EC2 | S3 | AWS Cloud
        </p>

        <button onclick="showMessage()">
            Click Me
        </button>

        <p id="demo"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("demo").innerHTML =
                "Your S3 static website is working successfully!";
        }
    </script>

</body>
</html>
